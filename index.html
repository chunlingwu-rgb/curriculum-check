    let deptData = [];
    let selectedCollege = "全部";
    let selectedStaff = "全部";

    function initSystem() {
        const urlParams = new URLSearchParams(window.location.search);
        const stateData = urlParams.get('state');
        if (stateData) {
            try {
                const parsedState = JSON.parse(decodeURIComponent(escape(atob(stateData))));
                deptData = initialData.map(item => {
                    const saved = parsedState.find(s => s.id === item.id);
                    return saved ? {
                        ...item,
                        s1: saved.s1 || false,
                        s2: saved.s2 || false,
                        s3: saved.s3 || false,
                        s4: saved.s4 || false,
                        c1: saved.c1 || false,
                        c2: saved.c2 || false,
                        step3: saved.p3 || false
                    } : {
                        ...item, s1: false, s2: false, s3: false, s4: false, c1: false, c2: false, step3: false
                    };
                });
            } catch (e) {
                console.error("還原失敗，啟用全新表格", e);
                resetAllProgress();
            }
        } else {
            resetAllProgress();
        }
    }

    function resetAllProgress() {
        deptData = initialData.map(item => ({
            ...item,
            s1: false, s2: false, s3: false, s4: false, 
            c1: false, c2: false,                       
            step3: false                                
        }));
    }

    function renderTable() {
        const tbody = document.getElementById("table-body");
        tbody.innerHTML = "";

        let filtered = deptData;
        if (selectedCollege !== "全部") {
            filtered = filtered.filter(d => d.college === selectedCollege);
        }
        if (selectedStaff !== "全部") {
            filtered = filtered.filter(d => d.staff === selectedStaff);
        }
        const keyword = document.getElementById("search-box").value.trim().toLowerCase();
        if (keyword) {
            filtered = filtered.filter(d => d.dept.toLowerCase().includes(keyword) || d.program.toLowerCase().includes(keyword));
        }

        filtered.forEach(item => {
            const tr = document.createElement("tr");

            // 🌟 修正重點 1：改為判斷是否「同時滿足日間部四技且為系專業課規」
            const isFourYearDayAndDeptProd = (item.program === "日間部四技" && item.type === "系專業課規");
            
            // 根據上述新條件判定階段一是否完備 (需要過 4 關或 3 關)
            const isStage1Complete = isFourYearDayAndDeptProd 
                ? (item.s1 && item.s2 && item.s3 && item.s4)
                : (item.s1 && item.s2 && item.s3);

            // 判斷階段二是否完全通過
            const isStage2Complete = isStage1Complete && item.c1 && item.c2;

            // 判斷總流程狀態
            let statusClass = "status-0";
            let statusText = "⏳ 未提報";
            if (isStage1Complete && !isStage2Complete) {
                statusClass = "status-1";
                statusText = "📩 綜業處審理中";
            } else if (isStage2Complete && !item.step3) {
                statusClass = "status-1";
                statusText = "📩 綜業處送交中";
            } else if (item.step3) {
                statusClass = "status-2";
                statusText = "✅ 教務處已簽收";
            }

            // 🌟 修正重點 2：動態生成階段一的 HTML (只有雙重符合者才給 4 個勾選框)

                stage1HTML = `

                        <div class="stage-title">
                            <span>【階段一】檢核清單</span>

                        </div>
                        <label class="check-item-row ${item.s1 ? 'checked-text' : ''}">

                        <label class="check-item-row ${item.s2 ? 'checked-text' : ''}">

                            <span>2. 紙本課規表一式二份已核章並送綜業處</span>
                        </label>
                        <label class="check-item-row ${item.s3 ? 'checked-text' : ''}">

                            <span>3. 系所網頁已更新</span>
                        </label>

                            <span>4. 教務系統-課程結構規劃表已更新</span>
                        </label>
                    </div>

            } else {
                stage1HTML = `
                    <div class="stage-box">
                        <div class="stage-title">
                            <span>【階段一】檢核清單</span>
                            ${isStage1Complete ? '<span style="color:#10b981;font-weight:bold;">✓ 完備</span>' : '<span style="color:#f59e0b;font-weight:bold;">未完備</span>'}
                        </div>
                        <label class="check-item-row ${item.s1 ? 'checked-text' : ''}">

                        </label>

                            <span>2. 系所網頁已更新</span>
                        </label>
                        <label class="check-item-row ${item.s3 ? 'checked-text' : ''}">
                            <input type="checkbox" ${item.s3 ? 'checked' : ''} onchange="toggleSubCheck(${item.id}, 's3', this.checked)">
                            <span>3. 教務系統-課程結構規劃表已更新</span>
                        </label>
                    </div>
                `;
            }

            const stage2HTML = `
                <div class="stage-box ${!isStage1Complete ? 'disabled-layer' : ''}">
                    <div class="stage-title">
                        <span>【階段二】綜業處檢核</span>
                        ${isStage2Complete ? '<span style="color:#10b981;font-weight:bold;">✓ 簽收轉送</span>' : '<span style="color:#64748b;font-weight:bold;">待核對</span>'}
                    </div>
                    <label class="check-item-row ${item.c1 ? 'checked-text' : ''}">
                        <input type="checkbox" ${!isStage1Complete ? 'disabled' : ''} ${item.c1 ? 'checked' : ''} onchange="toggleSubCheck(${item.id}, 'c1', this.checked)">
                        <span>1. 實體紙本課規表校對無誤</span>
                    </label>
                    <label class="check-item-row ${item.c2 ? 'checked-text' : ''}">
                        <input type="checkbox" ${!isStage1Complete ? 'disabled' : ''} ${item.c2 ? 'checked' : ''} onchange="toggleSubCheck(${item.id}, 'c2', this.checked)">
                        <span>2. 轉送其中 1 份至教務處課務組備查</span>
                    </label>
                </div>
            `;

            const stage3HTML = `
                <div style="padding-top:10px;" class="${!isStage2Complete ? 'disabled-layer' : ''}">
                    <label class="checkbox-label" style="font-size:12.5px;">
                        <input type="checkbox" ${!isStage2Complete ? 'disabled' : ''} ${item.step3 ? 'checked' : ''} onchange="toggleSubCheck(${item.id}, 'step3', this.checked)">
                        <span><b>【階段三】簽收備查</b></span>
                    </label>
                </div>
            `;

            tr.innerHTML = `
                <td><b>${item.college}</b></td>
                <td>
                    <span class="tag-badge">${item.type}</span><br>
                    <b style="font-size:14px;color:#1e3a8a;">${item.dept}</b><br>
                    <small style="color:#475569;font-weight:bold;">${item.program}</small>
                    <div class="staff-info">
                        👤 綜業處窗口：<b>${item.staff}</b><br>
                        ✉️ ${item.email}
                    </div>
                </td>
                <td>${stage1HTML}</td>
                <td>${stage2HTML}</td>
                <td>${stage3HTML}</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            `;
            tbody.appendChild(tr);
        });
        updateDashboard();
    }

    function toggleSubCheck(id, field, val) {
        const target = deptData.find(d => d.id === id);
        if (target) {
            target[field] = val;
            
            // 🌟 修正重點 3：防呆連鎖取消邏輯中，同步修正雙重條件判定
            const isFourYearDayAndDeptProd = (target.program === "日間部四技" && target.type === "系專業課規");
            const isStage1Complete = isFourYearDayAndDeptProd 
                ? (target.s1 && target.s2 && target.s3 && target.s4)
                : (target.s1 && target.s2 && target.s3);

            if (!isStage1Complete) {
                target.c1 = false;
                target.c2 = false;
                target.step3 = false;
            }

            const isStage2Complete = isStage1Complete && target.c1 && target.c2;
            if (!isStage2Complete) {
                target.step3 = false;
            }

            renderTable();
        }
    }

    function updateDashboard() {
        const total = deptData.length;
        const s2 = deptData.filter(d => {
            // 🌟 修正重點 4：儀表板進度計算公式同步調整
            const isFourYearDayAndDeptProd = (d.program === "日間部四技" && d.type === "系專業課規");
            const completedS1 = isFourYearDayAndDeptProd ? (d.s1 && d.s2 && d.s3 && d.s4) : (d.s1 && d.s2 && d.s3);
            const completedS2 = completedS1 && d.c1 && d.c2;
            return completedS2 && d.step3;
        }).length;

        const s1 = deptData.filter(d => {
            const isFourYearDayAndDeptProd = (d.program === "日間部四技" && d.type === "系專業課規");
            const completedS1 = isFourYearDayAndDeptProd ? (d.s1 && d.s2 && d.s3 && d.s4) : (d.s1 && d.s2 && d.s3);
            return completedS1 && !d.step3;
        }).length;

        const s0 = total - s1 - s2;

        document.getElementById("total-count").innerText = total;
        document.getElementById("status0-count").innerText = s0;
        document.getElementById("status1-count").innerText = s1;
        document.getElementById("status2-count").innerText = s2;

        const rate = total > 0 ? Math.round((s2 / total) * 100) : 0;
        const progressBar = document.getElementById("main-progress");
        progressBar.style.width = rate + "%";
        progressBar.innerText = rate + "% (" + s2 + "/" + total + ")";
    }

    function filterCollege(college, btn) {
        selectedCollege = college;
        document.querySelectorAll('#college-buttons .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTable();
    }

    function filterStaff(staff, btn) {
        selectedStaff = staff;
        document.querySelectorAll('#staff-buttons .filter-btn').forEach(b => b.classList.remove('staff-active'));
        if(staff !== '全部') btn.classList.add('staff-active');
        renderTable();
    }

    function searchDept() { renderTable(); }

    function generateSharedLink() {
        const stateSummary = deptData.map(d => ({
            id: d.id, 
            s1: d.s1, s2: d.s2, s3: d.s3, s4: d.s4,
            c1: d.c1, c2: d.c2,
            p3: d.step3
        }));
        const encodedState = btoa(unescape(encodeURIComponent(JSON.stringify(stateSummary))));
        const baseUrl = window.location.href.split('?')[0];
        const realMasterUrl = baseUrl + "?state=" + encodedState;
        prompt("💾 進度已儲存！請複製下方網址，並將其替換掉原本的瀏覽器書籤（或加到我的最愛）：", realMasterUrl);
    }

    initSystem();
    renderTable();
</script>
</body>
</html>
